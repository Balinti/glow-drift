<body>
  <div id="game-wrap">
    <h1>Glow Drift</h1>
    <div id="canvas-container">
      <canvas id="c"></canvas>
    </div>
    <div id="seo-text">
      <h2>How to Play</h2>
      <ul>
        <li>Tap or press Space/Enter to cycle lanes (Left → Mid → Right)</li>
        <li>Catch orbs that match your polarity color</li>
        <li>Every 3rd catch flips your polarity automatically</li>
        <li>Gold Overcharge orbs give big points — grab them!</li>
        <li>Wrong color = game over. Stay sharp!</li>
      </ul>
    </div>
  </div>

  <script>
  (function() {
    'use strict';

    // --- Canvas Setup ---
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const W = 420, H = 750;

    canvas.width  = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    // --- Constants ---
    const HS_KEY = 'glowdrift_highscore_v1';
    const LANES = [W * 0.22, W * 0.5, W * 0.78];
    const LANE_COUNT = 3;
    const PLAYER_Y = H - 100;
    const PLAYER_R = 22;
    const ORB_R = 18;

    // Polarity colors
    const POL = {
      pink: { h: 320, name: 'pink' },
      cyan: { h: 185, name: 'cyan' }
    };

    // --- Game State ---
    let state = 'start'; // start | playing | gameover
    let score = 0, combo = 0, highScore = parseInt(localStorage.getItem(HS_KEY) || '0');
    let polarity = 'pink'; // pink | cyan
    let catchCount = 0;
    let lane = 1; // 0=L, 1=M, 2=R
    let orbs = [], particles = [];
    let elapsed = 0, lastTime = 0;
    let shake = { x: 0, y: 0, t: 0, mag: 0 };
    let hitstop = 0;
    let paletteFlash = 0;
    let hue = 270;
    let gameOverTimer = 0;
    let stormMode = false;
    let stormTimer = 0;

    // Difficulty
    let baseSpeed = 120;
    let spawnInterval = 1.4;
    let spawnTimer = 0;
    let patternIndex = 0;

    const laneFlash = [0, 0, 0];

    // Skyline
    const skyline = buildSkyline();

    // --- Skyline Builder ---
    function buildSkyline() {
      const buildings = [];
      const rng = seededRng(42);
      let x = -20;
      while (x < W + 40) {
        const bw = 25 + rng() * 55;
        const bh = 60 + rng() * 220;
        buildings.push({ x, y: H - bh, w: bw, h: bh, layer: rng() < 0.4 ? 1 : 0 });
        x += bw + 2 + rng() * 10;
      }
      return buildings;
    }

    function seededRng(seed) {
      let s = seed;
      return function() {
        s = (s * 1664525 + 1013904223) & 0xffffffff;
        return (s >>> 0) / 0xffffffff;
      };
    }

    // --- Spawn Patterns ---
    function getSpawnPattern(phase) {
      const pats = [
        [{l:0,pol:'match'},{l:1,pol:'match'},{l:2,pol:'match'}],
        [{l:1,pol:'match'},{l:0,pol:'opposite'},{l:2,pol:'match'}],
        [{l:2,pol:'match'},{l:1,pol:'opposite'},{l:0,pol:'match'}],
        [{l:0,pol:'match'},{l:2,pol:'match'},{l:1,pol:'opposite'},{l:0,pol:'match'}],
        [{l:1,pol:'match'},{l:1,pol:'opposite'},{l:2,pol:'match'},{l:0,pol:'match'}],
        [{l:0,pol:'opposite'},{l:1,pol:'match'},{l:2,pol:'opposite'},{l:1,pol:'match'}],
        [{l:0,pol:'match'},{l:1,pol:'opposite'},{l:2,pol:'match'},{l:0,pol:'opposite'},{l:1,pol:'match'}],
        [{l:2,pol:'match'},{l:0,pol:'match'},{l:1,pol:'opposite'},{l:2,pol:'match'},{l:0,pol:'opposite'}],
      ];
      return pats[Math.min(phase, pats.length - 1)];
    }

    // --- Orb Spawning ---
    function spawnOrb() {
      const phase = Math.floor(elapsed / 20);
      const pat = getSpawnPattern(phase);
      const entry = pat[patternIndex % pat.length];
      patternIndex++;

      const isGold = Math.random() < 0.06;

      let orbPol;
      if (isGold) {
        orbPol = 'gold';
      } else {
        const flip = entry.pol === 'opposite';
        orbPol = flip
          ? (polarity === 'pink' ? 'cyan' : 'pink')
          : polarity;
      }

      const orbLane = stormMode ? Math.floor(Math.random() * LANE_COUNT) : entry.l;

      orbs.push({
        x: LANES[orbLane],
        y: -ORB_R - 10,
        lane: orbLane,
        pol: orbPol,
        speed: baseSpeed * (stormMode ? 1.4 : 1),
        r: ORB_R,
        hue: orbPol === 'gold' ? 45 : (orbPol === 'pink' ? POL.pink.h : POL.cyan.h),
        age: 0
      });
    }

    // --- Particle System ---
    function spawnParticles(x, y, color, count, type) {
      for (let i = 0; i < count; i++) {
        const angle = (Math.PI * 2 * i / count) + Math.random() * 0.3;
        const spd = 40 + Math.random() * 120;
        particles.push({
          x, y,
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd,
          life: 1,
          decay: 0.6 + Math.random() * 0.8,
          r: 2 + Math.random() * 3,
          color,
          type: 'spark',
          ringR: 0,
          maxR: 0
        });
      }
    }

    function spawnRingPulse(x, y, color) {
      particles.push({
        x, y, vx: 0, vy: 0, life: 1, decay: 1.8,
        r: 0, color, type: 'ring', maxR: 80, ringR: 0
      });
    }

    // --- Screen Shake ---
    function triggerShake(mag, dur) {
      shake.mag = mag;
      shake.t = dur;
    }

    // --- Input ---
    function handleInput() {
      if (state === 'start' || state === 'gameover') {
        if (state === 'gameover' && gameOverTimer < 0.8) return;
        startGame();
        return;
      }
      if (state === 'playing') {
        hopLane();
      }
    }

    canvas.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      handleInput();
    });

    document.addEventListener('keydown', function(e) {
      if (e.code === 'Space' || e.code === 'Enter') {
        e.preventDefault();
        handleInput();
      }
    });

    function hopLane() {
      lane = (lane + 1) % LANE_COUNT;
      laneFlash[lane] = 0.8;
    }

    // --- Game Logic ---
    function startGame() {
      state = 'playing';
      score = 0; combo = 0; catchCount = 0;
      lane = 1; polarity = 'pink';
      orbs = []; particles = [];
      elapsed = 0; lastTime = performance.now();
      baseSpeed = 120; spawnInterval = 1.4; spawnTimer = 0;
      patternIndex = 0; stormMode = false; stormTimer = 0;
      paletteFlash = 0; hitstop = 0;
      gameOverTimer = 0;
    }

    function comboMultiplier() {
      if (combo < 5)  return 1;
      if (combo < 15) return 2;
      if (combo < 30) return 3;
      return 4;
    }

    function doPolarityFlip() {
      polarity = polarity === 'pink' ? 'cyan' : 'pink';
      paletteFlash = 1;
      const px = LANES[lane], py = PLAYER_Y;
      const col = polarity === 'pink'
        ? ('hsl(' + POL.pink.h + ',100%,65%)')
        : ('hsl(' + POL.cyan.h + ',100%,60%)');
      spawnRingPulse(px, py, col);
      spawnParticles(px, py, col, 16, 'spark');
      hitstop = 55;
    }

    function catchOrb(orb) {
      const isGold = orb.pol === 'gold';
      const isMatch = isGold || orb.pol === polarity;

      if (!isMatch) {
        triggerShake(14, 0.4);
        spawnParticles(orb.x, orb.y, '#ff3355', 20, 'spark');
        spawnParticles(LANES[lane], PLAYER_Y, '#ff3355', 20, 'spark');
        gameOver();
        return;
      }

      const mult = comboMultiplier();
      const pts = isGold ? 50 * mult : 10 * mult;
      score += pts;
      combo++;
      catchCount++;

      const col = isGold
        ? '#ffd700'
        : (polarity === 'pink'
          ? ('hsl(' + POL.pink.h + ',100%,65%)')
          : ('hsl(' + POL.cyan.h + ',100%,60%)'));
      spawnParticles(orb.x, orb.y, col, 12 + mult * 2, 'spark');

      if (combo > 0 && combo % 10 === 0) {
        spawnParticles(orb.x, orb.y, '#ffffff', 25, 'spark');
        triggerShake(4, 0.15);
      }

      // Clutch bonus
      const dx = Math.abs(LANES[lane] - orb.x);
      if (dx < 8) {
        score += 5;
        triggerShake(2, 0.08);
      }

      hitstop = isGold ? 70 : 40;

      if (isGold || catchCount % 3 === 0) {
        doPolarityFlip();
      }

      if (isGold) {
        spawnParticles(orb.x, orb.y, '#ffd700', 30, 'spark');
        triggerShake(6, 0.2);
      }

      updateDifficulty();
    }

    function updateDifficulty() {
      baseSpeed = Math.min(340, 120 + Math.floor(score / 10) * 3);
      spawnInterval = Math.max(0.55, 1.4 - elapsed * 0.006);
    }

    function gameOver() {
      state = 'gameover';
      gameOverTimer = 0;
      if (score > highScore) {
        highScore = score;
        localStorage.setItem(HS_KEY, String(highScore));
      }
      triggerShake(18, 0.6);
      paletteFlash = 2;
    }

    // --- Update ---
    function update(dt) {
      if (state !== 'playing') {
        // still update particles + shake in gameover
        if (state === 'gameover') {
          gameOverTimer += dt;
          updateParticles(dt);
          updateShake(dt);
        }
        return;
      }

      elapsed += dt;
      hue = (hue + dt * 8) % 360;

      if (elapsed > 75 && !stormMode) {
        stormMode = true;
        stormTimer = 8;
      }
      if (stormMode) {
        stormTimer -= dt;
        if (stormTimer <= 0) { stormMode = false; stormTimer = 0; }
      }

      for (let i = 0; i < LANE_COUNT; i++) {
        laneFlash[i] = Math.max(0, laneFlash[i] - dt * 3);
      }

      paletteFlash = Math.max(0, paletteFlash - dt * 3);

      if (hitstop > 0) {
        hitstop = Math.max(0, hitstop - dt * 1000);
        if (hitstop > 0) return;
      }

      spawnTimer += dt;
      if (spawnTimer >= spawnInterval) {
        spawnTimer -= spawnInterval;
        spawnOrb();
      }

      const playerX = LANES[lane];
      const toRemove = [];
      for (let i = 0; i < orbs.length; i++) {
        const o = orbs[i];
        o.y += o.speed * dt;
        o.age += dt;

        const ddx = Math.abs(o.x - playerX);
        const ddy = Math.abs(o.y - PLAYER_Y);
        if (ddx < PLAYER_R + o.r - 4 && ddy < PLAYER_R + o.r - 4) {
          catchOrb(o);
          toRemove.push(i);
          continue;
        }

        if (o.y > H + o.r + 10) {
          if (o.pol === polarity) combo = 0;
          toRemove.push(i);
        }
      }

      for (let i = toRemove.length - 1; i >= 0; i--) {
        orbs.splice(toRemove[i], 1);
      }

      updateParticles(dt);
      updateShake(dt);
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= p.decay * dt;
        if (p.type === 'ring') {
          p.ringR = (1 - p.life) * p.maxR;
        } else {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 120 * dt;
        }
        if (p.life <= 0) particles.splice(i, 1);
      }
    }

    function updateShake(dt) {
      if (shake.t > 0) {
        shake.t -= dt;
        const s = shake.mag * (shake.t / 0.4);
        shake.x = (Math.random() - 0.5) * s * 2;
        shake.y = (Math.random() - 0.5) * s * 2;
      } else {
        shake.x = shake.y = 0;
      }
    }

    // --- Draw ---
    function draw() {
      ctx.save();
      ctx.translate(shake.x, shake.y);

      // Background
      const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
      bgGrad.addColorStop(0, 'hsl(' + ((hue + 180) % 360) + ',40%,4%)');
      bgGrad.addColorStop(1, 'hsl(' + hue + ',35%,6%)');
      ctx.fillStyle = bgGrad;
      ctx.fillRect(0, 0, W, H);

      if (paletteFlash > 0) {
        ctx.globalAlpha = paletteFlash * 0.18;
        ctx.fillStyle = polarity === 'pink'
          ? ('hsl(' + POL.pink.h + ',100%,60%)')
          : ('hsl(' + POL.cyan.h + ',100%,55%)');
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
      }

      drawSkyline();
      drawLanes();
      drawOrbs();
      drawParticles();

      if (state === 'playing') {
        drawPlayer();
        drawHUD();
      } else if (state === 'gameover') {
        drawPlayer();
        drawHUD_score();
        drawGameOverScreen();
      } else if (state === 'start') {
        drawStartScreen();
      }

      ctx.restore();
    }

    function drawSkyline() {
      ctx.globalAlpha = 0.18;
      ctx.fillStyle = 'hsl(' + ((hue + 200) % 360) + ',30%,15%)';
      for (let i = 0; i < skyline.length; i++) {
        const b = skyline[i];
        if (b.layer === 1) ctx.fillRect(b.x, b.y + 30, b.w, b.h);
      }
      ctx.globalAlpha = 0.32;
      ctx.fillStyle = 'hsl(' + ((hue + 220) % 360) + ',25%,10%)';
      for (let i = 0; i < skyline.length; i++) {
        const b = skyline[i];
        if (b.layer === 0) ctx.fillRect(b.x, b.y, b.w, b.h);
      }
      ctx.globalAlpha = 1;
    }

    function drawLanes() {
      const railH = [POL.pink.h, (hue + 90) % 360, POL.cyan.h];
      for (let i = 0; i < LANE_COUNT; i++) {
        const x = LANES[i];
        const flash = laneFlash[i];
        ctx.globalAlpha = 0.08 + flash * 0.35;
        const g = ctx.createLinearGradient(x - 1.5, 0, x + 1.5, 0);
        g.addColorStop(0, 'transparent');
        g.addColorStop(0.5, 'hsl(' + railH[i] + ',80%,50%)');
        g.addColorStop(1, 'transparent');
        ctx.fillStyle = g;
        ctx.fillRect(x - 1.5, 0, 3, H);
        ctx.globalAlpha = 1;
      }
    }

    function drawOrbs() {
      for (let i = 0; i < orbs.length; i++) {
        const o = orbs[i];
        const pulse = 0.85 + Math.sin(o.age * 5) * 0.15;
        const r = o.r * pulse;

        if (o.pol === 'gold') {
          ctx.shadowBlur = 22;
          ctx.shadowColor = '#ffd700';
          const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
          g.addColorStop(0, '#fffde0');
          g.addColorStop(0.5, '#ffd700');
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = '#ffe866';
          ctx.lineWidth = 1.5;
          ctx.globalAlpha = 0.7 + Math.sin(o.age * 8) * 0.3;
          for (let s = 0; s < 4; s++) {
            const a = (Math.PI / 4) + s * (Math.PI / 2) + o.age;
            ctx.beginPath();
            ctx.moveTo(o.x, o.y);
            ctx.lineTo(o.x + Math.cos(a) * r * 1.5, o.y + Math.sin(a) * r * 1.5);
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
        } else {
          ctx.shadowBlur = 16;
          ctx.shadowColor = 'hsl(' + o.hue + ',100%,60%)';
          const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
          g.addColorStop(0, 'hsl(' + o.hue + ',100%,90%)');
          g.addColorStop(0.4, 'hsl(' + o.hue + ',100%,65%)');
          g.addColorStop(1, 'transparent');
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(o.x, o.y, r, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.shadowBlur = 0;
      }
    }

    function drawPlayer() {
      const px = LANES[lane];
      const py = PLAYER_Y;
      const ph = polarity === 'pink' ? POL.pink.h : POL.cyan.h;
      const t = performance.now() / 1000;

      ctx.shadowBlur = 20;
      ctx.shadowColor = 'hsl(' + ph + ',100%,60%)';

      ctx.beginPath();
      ctx.arc(px, py, PLAYER_R, 0, Math.PI * 2);
      ctx.strokeStyle = 'hsl(' + ph + ',100%,70%)';
      ctx.lineWidth = 3;
      ctx.stroke();

      const innerR = PLAYER_R * (0.45 + Math.sin(t * 4) * 0.08);
      const ig = ctx.createRadialGradient(px, py, 0, px, py, innerR);
      ig.addColorStop(0, 'hsl(' + ph + ',100%,95%)');
      ig.addColorStop(1, 'hsl(' + ph + ',100%,60%)');
      ctx.fillStyle = ig;
      ctx.beginPath();
      ctx.arc(px, py, innerR, 0, Math.PI * 2);
      ctx.fill();

      ctx.lineWidth = 2;
      ctx.strokeStyle = 'hsl(' + ph + ',100%,80%)';
      for (let i = 0; i < 4; i++) {
        const a = t * 1.5 + (Math.PI / 2) * i;
        const r1 = PLAYER_R + 5;
        const r2 = PLAYER_R + 11;
        ctx.beginPath();
        ctx.moveTo(px + Math.cos(a) * r1, py + Math.sin(a) * r1);
        ctx.lineTo(px + Math.cos(a) * r2, py + Math.sin(a) * r2);
        ctx.stroke();
      }

      ctx.shadowBlur = 0;
    }

    function drawParticles() {
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        ctx.globalAlpha = Math.max(0, p.life);
        if (p.type === 'ring') {
          ctx.strokeStyle = p.color;
          ctx.lineWidth = 2.5;
          ctx.shadowBlur = 10;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.ringR, 0, Math.PI * 2);
          ctx.stroke();
          ctx.shadowBlur = 0;
        } else {
          ctx.fillStyle = p.color;
          ctx.shadowBlur = 8;
          ctx.shadowColor = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, Math.max(0.5, p.r * p.life), 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        }
      }
      ctx.globalAlpha = 1;
    }

    function drawHUD() {
      const ph = polarity === 'pink' ? POL.pink.h : POL.cyan.h;

      ctx.textAlign = 'center';
      ctx.font = 'bold 28px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'hsl(' + ph + ',100%,80%)';
      ctx.shadowBlur = 10;
      ctx.shadowColor = 'hsl(' + ph + ',100%,60%)';
      ctx.fillText(String(score), W / 2, 44);
      ctx.shadowBlur = 0;

      if (combo >= 2) {
        const mult = comboMultiplier();
        ctx.font = 'bold ' + (14 + mult * 2) + 'px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = 'hsl(' + ((ph + 40) % 360) + ',100%,75%)';
        ctx.fillText('x' + mult + ' COMBO ' + combo, W / 2, 70);
      }

      ctx.textAlign = 'right';
      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(180,150,255,0.5)';
      ctx.fillText('BEST ' + highScore, W - 12, 20);

      ctx.textAlign = 'left';
      ctx.font = 'bold 11px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'hsl(' + ph + ',100%,70%)';
      ctx.fillText(polarity.toUpperCase(), 12, 20);

      if (stormMode) {
        ctx.textAlign = 'center';
        ctx.font = 'bold 13px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = 'hsl(30,100%,70%)';
        ctx.shadowBlur = 8;
        ctx.shadowColor = '#ff8800';
        ctx.fillText('!! STORM !!', W / 2, H - 20);
        ctx.shadowBlur = 0;
      }
    }

    function drawHUD_score() {
      ctx.textAlign = 'right';
      ctx.font = '12px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(180,150,255,0.5)';
      ctx.fillText('BEST ' + highScore, W - 12, 20);
    }

    function drawStartScreen() {
      ctx.fillStyle = 'rgba(5,0,15,0.72)';
      ctx.fillRect(0, 0, W, H);

      const t = performance.now() / 1000;
      const titleHue = (hue + 30) % 360;

      ctx.textAlign = 'center';
      ctx.font = 'bold 48px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'hsl(' + titleHue + ',100%,75%)';
      ctx.shadowBlur = 24;
      ctx.shadowColor = 'hsl(' + titleHue + ',100%,60%)';
      ctx.fillText('GLOW', W / 2, H / 2 - 50);
      ctx.fillStyle = 'hsl(' + ((titleHue + 60) % 360) + ',100%,75%)';
      ctx.shadowColor = 'hsl(' + ((titleHue + 60) % 360) + ',100%,60%)';
      ctx.fillText('DRIFT', W / 2, H / 2 + 10);
      ctx.shadowBlur = 0;

      ctx.font = '16px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(200,170,255,0.85)';
      ctx.fillText('Polarity Switch', W / 2, H / 2 + 40);

      const alpha = 0.55 + Math.sin(t * 2.5) * 0.45;
      ctx.globalAlpha = alpha;
      ctx.font = 'bold 17px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#e0c8ff';
      ctx.fillText('TAP OR PRESS SPACE', W / 2, H / 2 + 100);
      ctx.globalAlpha = 1;

      if (highScore > 0) {
        ctx.font = '13px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = 'rgba(180,150,255,0.6)';
        ctx.fillText('BEST: ' + highScore, W / 2, H / 2 + 130);
      }
    }

    function drawGameOverScreen() {
      ctx.fillStyle = 'rgba(10,0,20,' + Math.min(0.8, gameOverTimer * 2) + ')';
      ctx.fillRect(0, 0, W, H);

      const alpha = Math.min(1, gameOverTimer * 2.5);
      ctx.globalAlpha = alpha;

      ctx.textAlign = 'center';
      ctx.font = 'bold 42px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#ff4466';
      ctx.shadowBlur = 20;
      ctx.shadowColor = '#ff0033';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 60);
      ctx.shadowBlur = 0;

      ctx.font = 'bold 32px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = '#e0c8ff';
      ctx.fillText(String(score), W / 2, H / 2 - 10);

      ctx.font = '15px "Segoe UI", system-ui, sans-serif';
      ctx.fillStyle = 'rgba(180,150,255,0.7)';
      ctx.fillText('BEST: ' + highScore, W / 2, H / 2 + 22);

      if (gameOverTimer > 0.8) {
        const t = performance.now() / 1000;
        const pa = 0.55 + Math.sin(t * 2.5) * 0.45;
        ctx.globalAlpha = alpha * pa;
        ctx.font = 'bold 17px "Segoe UI", system-ui, sans-serif';
        ctx.fillStyle = '#e0c8ff';
        ctx.fillText('TAP TO RETRY', W / 2, H / 2 + 70);
      }

      ctx.globalAlpha = 1;
    }

    // --- Game Loop ---
    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.05);
      lastTime = now;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    // --- Init ---
    lastTime = performance.now();
    requestAnimationFrame(loop);

  })();
  </script>
</body>
</html>
